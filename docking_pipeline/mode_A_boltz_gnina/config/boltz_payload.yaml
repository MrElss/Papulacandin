entities:
  - type: protein
    chain_ids: [A]
    value: 
  - type: ligand_smiles
    chain_ids: [B]
    value: "CCC(C)CC/C=C/C=C(C)/C(O)C/C=C/C=C/C(=O)O[C@@H]1[C@@H](O)[C@@]2(OCc3cc(O)cc(O)c23)O[C@H](CO)[C@H]1O[C@@H]4O[C@H](COC(=O)/C=C/C=C/C=C/C(O)CC)[C@H](O)[C@H](O)[C@H]4O"

# Experiment-directed pocket restraint. Residue indices are 0-based equivalents
# of FKS1 P38631 residues 635, 638, 639, 643, 695, 1357, 1360, 1361,
# 1364, 1365 and 1368 used by 02_make_box.py. force:false keeps it soft.
constraints:
  - type: pocket
    binder_chain_id: B
    contact_residues:
      A: [634, 637, 638, 642, 694, 1356, 1359, 1360, 1363, 1364, 1367]
    max_distance_angstrom: 6.0
    force: false

# Generate an ensemble so Mode A can test pose reproducibility, not a single draw.
num_samples: 5
model_options:
  recycling_steps: 3
  sampling_steps: 200
